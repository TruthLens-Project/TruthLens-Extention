<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens Global Dashboard (Pathway Powered)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            margin: 0;
            padding: 30px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ── Animated floating orbs ── */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
            animation: floatOrb 10s ease-in-out infinite alternate;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6c5ce7, #a29bfe);
            top: -100px;
            left: -80px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #fd79a8, #e84393);
            bottom: -80px;
            right: -60px;
            animation-delay: 5s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.2); }
        }

        /* ── Page wrapper for z-index ── */
        .page-wrapper {
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 24px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .logo span {
            font-weight: 400;
            font-size: 16px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.5);
        }

        .pathway-badge {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 12px;
            font-weight: 500;
            color: #d0d0e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.3px;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        /* ── Glass Cards ── */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25),
                        inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            border-color: rgba(162, 155, 254, 0.25);
            box-shadow: 0 12px 40px rgba(108, 92, 231, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ── Stats ── */
        .stat-box {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .stat-value {
            font-size: 40px;
            font-weight: 800;
            text-shadow: 0 0 20px currentColor;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── Feed Items ── */
        .feed-item {
            background: rgba(255, 255, 255, 0.04);
            margin-bottom: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 4px solid rgba(255, 255, 255, 0.15);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .feed-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .feed-verdict {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        .feed-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
            line-height: 1.5;
        }

        .feed-meta {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.3px;
        }

        /* ── Verdict colors with glow ── */
        .v-match {
            border-color: #55efc4 !important;
            color: #55efc4 !important;
        }

        .v-match .feed-verdict {
            text-shadow: 0 0 12px rgba(85, 239, 196, 0.4);
        }

        .v-false {
            border-color: #ff6b6b !important;
            color: #ff6b6b !important;
        }

        .v-false .feed-verdict {
            text-shadow: 0 0 12px rgba(255, 107, 107, 0.4);
        }

        .v-likely {
            border-color: #ffeaa7 !important;
            color: #ffeaa7 !important;
        }

        .v-likely .feed-verdict {
            text-shadow: 0 0 12px rgba(255, 234, 167, 0.4);
        }

        /* ── Custom scrollbar ── */
        body::-webkit-scrollbar {
            width: 6px;
        }

        body::-webkit-scrollbar-track {
            background: transparent;
        }

        body::-webkit-scrollbar-thumb {
            background: rgba(162, 155, 254, 0.3);
            border-radius: 6px;
        }

        body::-webkit-scrollbar-thumb:hover {
            background: rgba(162, 155, 254, 0.5);
        }
    </style>
</head>

<body>

    <div class="page-wrapper">

    <div class="header">
        <div class="logo">TruthLens <span>Global Brain</span></div>
        <div class="pathway-badge">⚡ Powered by Pathway Stream Processing</div>
    </div>

    <div class="grid">
        <!-- Left: Aggregated Stats -->
        <div class="card">
            <div class="card-title">Real-Time Stats</div>
            <div id="statsContainer">
                <div style="text-align: center; color: rgba(255,255,255,0.3); font-size: 13px;">Waiting for stream...</div>
            </div>
        </div>

        <!-- Right: Recent Feed -->
        <div class="card">
            <div class="card-title">Live Claim Stream</div>
            <div id="feedContainer">
                <!-- Feed items will go here -->
            </div>
        </div>
    </div>

    </div>

    <script>
        function updateDashboard() {
            fetch('http://localhost:8000/dashboard-data')
                .then(response => response.json())
                .then(data => {
                    // 1. Update Stats
                    const statsDiv = document.getElementById('statsContainer');
                    if (data.stats && data.stats.length > 0) {
                        statsDiv.innerHTML = '';
                        data.stats.reverse().forEach(stat => {
                            // stat uses 'verdict' and 'count' from Pathway groupby
                            const color = stat.verdict.includes('True') || stat.verdict.includes('Match') ? '#55efc4' :
                                stat.verdict.includes('False') ? '#ff6b6b' : '#ffeaa7';

                            const html = `
                                <div class="stat-box">
                                    <div class="stat-value" style="color: ${color}">${stat.count}</div>
                                    <div class="stat-label">${stat.verdict}</div>
                                </div>
                            `;
                            statsDiv.innerHTML += html;
                        });
                    }

                    // 2. Update Feed
                    const feedDiv = document.getElementById('feedContainer');
                    if (data.recent && data.recent.length > 0) {
                        feedDiv.innerHTML = '';
                        data.recent.forEach(item => {
                            let borderClass = 'v-likely';
                            if (item.verdict.includes('Match') || item.verdict.includes('True')) borderClass = 'v-match';
                            else if (item.verdict.includes('False')) borderClass = 'v-false';

                            const html = `
                                <div class="feed-item ${borderClass}">
                                    <div class="feed-verdict ${borderClass}">${item.verdict} (${item.score}%)</div>
                                    <div class="feed-text">"${item.text}"</div>
                                    <div class="feed-meta">
                                        <span>Source: ${item.source.substring(0, 30)}</span>
                                        <span>Live Ingestion</span>
                                    </div>
                                </div>
                            `;
                            feedDiv.innerHTML += html;
                        });
                    }
                })
                .catch(err => console.error("Error fetching dashboard data:", err));
        }

        // Poll every 2 seconds
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>

</html>
